<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#f0f9ff"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="100" fill="#ffffff"/>
  <circle cx="80" cy="50" r="24" fill="#0ea5e9"/>
  <text x="130" y="62" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a">বিদ্যায়ন - স্মার্ট লার্নিং প্ল্যাটফর্ম</text>
  
  <!-- Main layout -->
  <rect x="40" y="140" width="360" height="520" rx="20" fill="#ffffff"/>
  <circle cx="100" cy="220" r="30" fill="#3b82f6" fill-opacity="0.1"/>
  <text x="150" y="230" font-family="sans-serif" font-size="28" font-weight="bold" fill="#334155">মডেল টেস্ট</text>
  <text x="150" y="270" font-family="sans-serif" font-size="20" fill="#64748b">যেকোনো সময় অনুশীলন</text>
  
  <rect x="440" y="140" width="360" height="520" rx="20" fill="#ffffff"/>
  <circle cx="500" cy="220" r="30" fill="#10b981" fill-opacity="0.1"/>
  <text x="550" y="230" font-family="sans-serif" font-size="28" font-weight="bold" fill="#334155">লার্নিং মেটেরিয়াল</text>
  <text x="550" y="270" font-family="sans-serif" font-size="20" fill="#64748b">গুরুত্বপূর্ণ স্টাডি নোটস</text>
  
  <rect x="840" y="140" width="360" height="520" rx="20" fill="#ffffff"/>
  <circle cx="900" cy="220" r="30" fill="#8b5cf6" fill-opacity="0.1"/>
  <text x="950" y="230" font-family="sans-serif" font-size="28" font-weight="bold" fill="#334155">AI টিউটর</text>
  <text x="950" y="270" font-family="sans-serif" font-size="20" fill="#64748b">স্মার্ট অ্যাসিস্ট্যান্টের সাহায্য</text>
  
</svg>
