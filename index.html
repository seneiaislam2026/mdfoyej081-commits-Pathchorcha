<!doctype html>
<html lang="bn">
  <head>
  
  
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/wFXWcZXP/file-00000000bc2872099134372cd3b088f3.jpg" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/wFXWcZXP/file-00000000bc2872099134372cd3b088f3.jpg" />
    <meta name="description" content="বিদ্যায়ন - Biddayon. Bengali Educational Exam Preparation Platform" />
    <title>বিদ্যায়ন</title>
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });
      
      // Register service worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
